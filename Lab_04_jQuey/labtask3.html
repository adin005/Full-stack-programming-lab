<style>
    .form-box { max-width: 350px; margin: auto; padding: 30px; border: 1px solid #eee; border-radius: 10px; font-family: sans-serif; }
    h2 { text-align: center; color: #444; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s; }
    .error-text { color: #ff4d4d; font-size: 12px; display: none; }
    button { width: 100%; padding: 12px; background: #6c63ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    #successMsg { display: none; text-align: center; color: #28a745; font-weight: bold; padding: 20px; border: 2px solid #28a745; border-radius: 10px; }
</style>

<div class="form-box" id="formWrapper">
    <h2>Create Account</h2>
    <form id="regForm">
        <input type="text" id="user" placeholder="Username">
        <div class="error-text" id="userErr">Username is required</div>
        <input type="email" id="email" placeholder="Email Address">
        <div class="error-text" id="emailErr">Valid email required</div>
        <button type="submit">Register Now</button>
    </form>
</div>
<div id="successMsg">🎉 Registration Complete!</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    $('input').on('blur', function() {
        if ($(this).val() === "") {
            $(this).css("border-color", "#ff4d4d").next('.error-text').fadeIn();
        } else {
            $(this).css("border-color", "#28a745").next('.error-text').fadeOut();
        }
    });

    $('#regForm').submit(function(e) {
        e.preventDefault();
        if ($('#user').val() && $('#email').val()) {
            $('#formWrapper').slideUp(400, function() {
                $('#successMsg').fadeIn();
            });
        }
    });
});
</script>
