<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; }
    .container { max-width: 400px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { color: #333; margin-top: 0; }
    input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
    #addBtn { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { padding: 0; margin-top: 20px; }
    li { 
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px; border-bottom: 1px solid #eee; transition: all 0.3s; 
    }
    .highlight { background-color: #e8f4fd; transform: scale(1.02); border-radius: 8px; border: 1px solid #3498db; }
    .del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
</style>

<div class="container">
    <h2>Task Tracker</h2>
    <input type="text" id="itemInput" placeholder="What needs to be done?">
    <button id="addBtn">Add</button>
    <ul id="itemList"></ul>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    $('#addBtn').click(function() {
        let val = $('#itemInput').val();
        if(val) {
            let item = $(`<li><span>${val}</span> <button class="del">Delete</button></li>`).hide();
            $('#itemList').append(item);
            item.slideDown(300);
            $('#itemInput').val('');
        }
    });
    $('#itemList').on('mouseenter', 'li', function() { $(this).addClass('highlight'); });
    $('#itemList').on('mouseleave', 'li', function() { $(this).removeClass('highlight'); });
    $('#itemList').on('click', '.del', function() {
        $(this).parent().fadeOut(300, function() { $(this).remove(); });
    });
});
</script>
